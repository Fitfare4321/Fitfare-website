name: Deploy to GitHub Pages

on:
  push:
    branches: [ "new-web" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
      - run: npm install
      - run: npm run build
      - name: Prepare SPA fallback for GitHub Pages
        run: |
          # Copy index.html to 404.html for SPA routing
          cp dist/index.html dist/404.html
          # Create .nojekyll to disable Jekyll processing
          touch dist/.nojekyll
          # Ensure CNAME file exists for custom domain
          echo "fitfare.in" > dist/CNAME
          # Verify 404.html was created
          if [ ! -f dist/404.html ]; then
            echo "Error: 404.html was not created"
            exit 1
          fi
          echo "✅ SPA fallback (404.html) created successfully"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "dist"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
